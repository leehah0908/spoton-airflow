name: Deploy Airflow to EC2

on:
    push:
        branches:
            - main

jobs:
    Deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Github Repository Code Load
              uses: actions/checkout@v4

            - name: AWS credentials setting (for Access AWS Resource)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-region: ap-northeast-2
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

            - name: SSH - EC2 access
              uses: appleboy/ssh-action@v1.0.3
              with:
                  username: ubuntu
                  host: ${{ secrets.EC2_HOST }}
                  key: ${{ secrets.EC2_PRIVATE_KEY }}
                  script_stop: true
                  script: |
                      ls -a
                      sudo rm -rf /home/ubuntu/spoton/spoton-airflow/dags/ || true
                      sudo rm -rf /home/ubuntu/spoton/spoton-airflow/config/ || true
                      sudo rm -rf /home/ubuntu/spoton/spoton-airflow/files/ || true
                      sudo rm -rf /home/ubuntu/spoton/spoton-airflow/plugins/ || true
                      ls -al $GITHUB_WORKSPACE/spoton
                      sudo cp -r .$GITHUB_WORKSPACE/spoton/dags ./spoton/spoton-airflow/ || exit 1
                      sudo cp -r .$GITHUB_WORKSPACE/spoton/config ./spoton/spoton-airflow/ || exit 1
                      sudo cp -r .$GITHUB_WORKSPACE/spoton/files ./spoton/spoton-airflow/ || exit 1
                      sudo cp -r .$GITHUB_WORKSPACE/spoton/plugins ./spoton/spoton-airflow/ || exit 1
