name: Deploy Airflow to EC2

on:
    push:
        branches:
            - main

jobs:
    Deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Github Repository Code Load
              uses: actions/checkout@v4

            - name: AWS credentials setting (for Access AWS Resource)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-region: ap-northeast-2
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

            - name: Transfer code to EC2
              run: |
                  ssh -i ${{ secrets.EC2_PRIVATE_KEY }} ubuntu@${{ secrets.EC2_HOST }} "rm -rf /home/ubuntu/spoton/spoton-airflow/dags/"
                  scp -i ${{ secrets.EC2_PRIVATE_KEY }} -r $GITHUB_WORKSPACE/dags ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/spoton/spoton-airflow/
